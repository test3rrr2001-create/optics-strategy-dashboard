<!DOCTYPE html>
<html>
<head>
    <title>RSS Parser Regex Test</title>
</head>
<body>
    <pre id="output"></pre>
    <script>
        const xmlText = `
<rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns="http://purl.org/rss/1.0/" xmlns:dc="http://purl.org/dc/elements/1.1/">
<item rdf:about="https://www.mhlw.go.jp/stf/newpage_71548.html">
<title><![CDATA[タレント・作家の高山一実さんが出演「“一”から“実”になる医薬品産業」を公開]]></title>
<link>https://www.mhlw.go.jp/stf/newpage_71548.html</link>
<dc:creator>厚生労働省</dc:creator>
<dc:date>2026-03-13T14:00:00+09:00</dc:date>
</item>
<item rdf:about="https://www.mhlw.go.jp/stf/newpage_71469.html">
<title><![CDATA[「戦後80年　記憶の継承作文コンクール」の表彰式を開催します]]></title>
<link>https://www.mhlw.go.jp/stf/newpage_71469.html</link>
<dc:creator>厚生労働省</dc:creator>
<dc:date>2026-03-13T14:00:00+09:00</dc:date>
</item>
</rdf:RDF>
        `;

        const log = (msg) => {
            document.getElementById('output').textContent += msg + '\n';
            console.log(msg);
        };

        log("Testing Regex Fix...");

        // The updated regex
        const itemRegex = /<(item|entry)[^>]*>[\s\S]*?<\/\1>/g;
        const items = xmlText.match(itemRegex) || [];

        log(`Found ${items.length} items.`);

        items.forEach((item, index) => {
            log(`\n--- Item ${index + 1} ---`);
            const title = (item.match(/<title[^>]*>(.*?)<\/title>/)?.[1] || "")
                .replace(/<!\[CDATA\[(.*?)\]\]>/g, "$1")
                .replace(/<[^>]+>/g, '')
                .trim();
            log(`Title: ${title}`);

            const pubDateStr = item.match(/<(pubDate|dc:date|published|updated)[^>]*>(.*?)<\/\1>/)?.[2] || "";
            log(`Date String: ${pubDateStr}`);
        });

        if (items.length === 2 && items[0].includes("高山一実")) {
            log("\nSUCCESS: Regex correctly parsedattributed item tags.");
        } else {
            log("\nFAILURE: Regex did not parse as expected.");
        }
    </script>
</body>
</html>
